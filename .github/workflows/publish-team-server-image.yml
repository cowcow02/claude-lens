name: Publish team-server image

on:
  push:
    branches: [master]
    paths:
      - "packages/team-server/**"
      - "packages/parser/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish-team-server-image.yml"
    tags: ["server-v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read team-server version
        id: tsver
        run: echo "version=$(jq -r .version packages/team-server/package.json)" >> "$GITHUB_OUTPUT"

      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/server-v')
        run: |
          expected="${GITHUB_REF_NAME#server-v}"
          actual="${{ steps.tsver.outputs.version }}"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $actual"
            exit 1
          fi

      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/fleetlens-team-server"
          TAGS="$IMAGE:${GITHUB_SHA::7}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/server-v* ]]; then
            VERSION="${{ steps.tsver.outputs.version }}"
            TAGS="$TAGS,$IMAGE:${VERSION},$IMAGE:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/team-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.tsver.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Fleetlens Team Edition server (Next.js + Postgres)
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
