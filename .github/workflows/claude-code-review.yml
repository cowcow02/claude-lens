name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the conventions in CLAUDE.md. Focus on:

            1. **Correctness** — logic bugs, edge cases, incorrect assumptions about the parser/analytics layer.
            2. **Fleetlens conventions** — canonical project naming, agent-time vs wall-clock, no premature abstractions, no comments explaining WHAT (only WHY for non-obvious invariants), error handling only at boundaries.
            3. **Versioning discipline** — never edit sub-package versions manually; CLI bumps go through `npm version` at root, team-server bumps through the documented manual flow.
            4. **Security** — input validation at boundaries, no secrets in logs, no broadened permissions.
            5. **Testing** — parser changes need vitest coverage; web changes should be smoke-test-able.

            Use inline comments for specific issues; top-level comments for general observations. Be concise — match the project's "kept deliberately brief" style.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
